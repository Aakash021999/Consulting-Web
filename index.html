<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulting Web</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: #f8f8f8;
            color: #333;
        }
        h1, h2, h3 {
            margin: 0.5em 0;
            font-weight: bold;
            text-transform: uppercase;
        }
        p {
            margin: 0.5em 0;
            padding: 0 10px;
        }
        /* Enhanced spacing */
        .container {
            margin: 20px;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        /* Typography improvements */
        h1 { font-size: 2.5em; }
        h2 { font-size: 2em; }
        h3 { font-size: 1.5em; }
        /* Micro-interactions */
        button {
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        /* Visual hierarchy improvements */
        .highlight {
            background-color: #ffeb3b;
            font-weight: bold;
        }
        /* Smoother animations */
        .fade-in {
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* Refined component styling */
        .button-primary {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .button-primary:hover {
            background-color: #0056b3;
        }
        /* Better responsive design */
        @media (max-width: 600px) {
            h1 { font-size: 2em; }
            h2 { font-size: 1.75em; }
            p { font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="container fade-in">
        <h1>Welcome to Our Consulting Services</h1>
        <h2>We Offer The Best Solutions For Your Business</h2>
        <p>Contact us today for a consultation!</p>
        <button class="button-primary">Get in Touch</button>
    </div>
</body>
</html>
